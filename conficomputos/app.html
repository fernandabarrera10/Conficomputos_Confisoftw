<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfíComputos — Iniciar sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle">
        <img src="img/logo.jpeg" alt="ConfíComputos">
      </div>
      <h1>ConfíComputos</h1>
      <p>Sistema de Gestión Empresarial</p>
    </div>

       <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="login-email" value="admin@conficomputos.com" placeholder="usuario@conficomputos.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" value="admin123" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label>Rol</label>
      <select id="login-rol">
        <option value="admin">🛡️ Administrador</option>
        <option value="usuario">👤 Usuario / Cliente</option>
      </select>
    </div>

    <!-- Olvidé contraseña -->
    <div style="text-align:right;margin-top:-10px;margin-bottom:14px">
      <button class="link-btn" id="btn-forgot" style="font-size:13px">🔑 Olvidé mi contraseña</button>
    </div>

    <button class="btn btn-rosa btn-full btn-lg" id="btn-login">Iniciar sesión</button>
    <div class="form-error" id="login-error"></div>

    <div class="auth-footer">
      <span>¿No tienes cuenta?</span>
      <button class="link-btn" id="btn-ir-registro">Crear perfil gratis ✨</button>
    </div>
    <div style="text-align:center;margin-top:14px">
      <a href="index.html" style="font-size:13px;color:var(--gris-400)">← Volver a la página principal</a>
    </div>
  </div>
</div>

<!-- ══ MODAL: Olvidé mi contraseña ══ -->
<div class="modal-overlay" id="modal-forgot">
  <div class="modal-box" style="max-width:440px">

    <!-- PASO 1: Ingresar correo y elegir método -->
    <div id="forgot-step-1">
      <h3 class="modal-title">🔑 Recuperar contraseña</h3>
      <p style="font-size:14px;color:var(--gris-500);margin-bottom:20px">Ingresa tu correo registrado y elige cómo recibir el código.</p>
      <div class="form-group">
        <label for="correo">Correo electrónico:</label>
          <input
              type="email"
              id="correo"
              name="correo"
              required
              pattern="^[a-zA-Z0-9._%+-]+@(gmail\.com|hotmail\.com|yahoo\.com|outlook\.com)$"
              title="Solo se permiten correos de Gmail, Hotmail, Yahoo y Outlook">
      </div>
      <div class="form-group">
        <label for="forgot-metodo">¿Cómo quieres recibir el código?</label>
        <div style="display:flex;gap:10px;margin-top:6px">
          <label style="flex:1;cursor:pointer">
            <input type="radio" name="forgot-metodo" value="email" checked style="accent-color:var(--rosa-600)">
            <span style="margin-left:6px;font-size:14px">📧 Correo electrónico</span>
          </label>
          <label style="flex:1;cursor:pointer">
            <input type="radio" name="forgot-metodo" value="sms" style="accent-color:var(--rosa-600)">
            <span style="margin-left:6px;font-size:14px">📱 SMS al celular</span>
          </label>
        </div>
      </div>
      <div class="form-error" id="forgot-error-1"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="document.getElementById('modal-forgot').classList.remove('open')">Cancelar</button>
        <button class="btn btn-rosa" id="btn-send-reset">Enviar código →</button>
      </div>
    </div>

    <!-- PASO 2: Ingresar código -->
    <div id="forgot-step-2" style="display:none">
      <h3 class="modal-title">📬 Ingresa el código</h3>
      <div id="reset-info" style="font-size:14px;color:var(--gris-700);margin-bottom:20px;padding:12px;background:var(--rosa-50);border-radius:10px;border:1px solid var(--rosa-200)"></div>
      <div class="form-group">
        <label>Código de verificación (8 caracteres)</label>
        <input type="text" id="reset-token" placeholder="Ej: AB12CD34" maxlength="8" style="text-transform:uppercase;letter-spacing:4px;font-size:20px;text-align:center;font-weight:700">
      </div>
      <p style="font-size:12px;color:var(--gris-400);text-align:center">El código expira en 15 minutos</p>
      <div class="form-error" id="forgot-error-2"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btn-back-forgot">← Atrás</button>
        <button class="btn btn-rosa" id="btn-verify-reset">Verificar código →</button>
      </div>
    </div>

    <!-- PASO 3: Nueva contraseña -->
    <div id="forgot-step-3" style="display:none">
      <h3 class="modal-title">🔒 Nueva contraseña</h3>
      <p style="font-size:14px;color:var(--gris-500);margin-bottom:20px">Elige una nueva contraseña segura.</p>
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" id="new-pass" placeholder="Mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="new-pass2" placeholder="Repite la contraseña">
      </div>
      <div class="form-error" id="forgot-error-3"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="document.getElementById('modal-forgot').classList.remove('open')">Cancelar</button>
        <button class="btn btn-rosa" id="btn-save-pass">✅ Guardar contraseña</button>
      </div>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/models.js"></script>
<script src="js/database.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
