<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfíComputos — Mi cuenta</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/app.css">
</head>
<body>

<div class="app-shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="tb-icon-btn" id="btn-menu-toggle" style="display:none" aria-label="Menú">☰</button>
    <div class="topbar-brand">
      <div class="tb-logo">
         <img src="img/logo.jpeg" alt="ConfíComputos" class="footer-logo">
      </div>
      <span class="tb-name">Confísoftw</span>
    </div>
    <div class="topbar-spacer"></div>
    <div class="tb-actions">
      <button class="tb-icon-btn" id="btn-ir-carrito" title="Carrito">
        🛒
        <span class="tb-badge" id="cart-badge" style="display:none">0</span>
      </button>
      <div class="tb-user">
        <div class="avatar" id="tb-avatar">U</div>
        <span id="tb-user-name">Usuario</span>
      </div>
    </div>
  </header>

  <div class="layout">

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <button class="nav-item" data-section="productos">
        <span class="nav-icon">🛍️</span><span>Productos</span>
      </button>
      <button class="nav-item" data-section="carrito">
        <span class="nav-icon">🛒</span>
        <span>Carrito</span>
        <span class="nav-badge" id="nav-badge-carrito" style="display:none">0</span>
      </button>
      <button class="nav-item" data-section="historial">
        <span class="nav-icon">📋</span><span>Mis Pedidos</span>
      </button>
      <button class="nav-item" data-section="perfil">
        <span class="nav-icon">👤</span><span>Mi Perfil</span>
      </button>
      <div class="nav-sep"></div>
      <button class="nav-item nav-logout" id="btn-logout">
        <span class="nav-icon">🚪</span><span>Cerrar sesión</span>
      </button>
    </nav>

    <!-- CONTENT -->
    <main class="content" id="main-content">
      <div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--gris-400)">
        Cargando...
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>

<script src="../js/models.js"></script>
<script src="../js/database.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/user.js"></script>

<script>
if (window.innerWidth <= 900) {
  document.getElementById('btn-menu-toggle').style.display = 'flex';
}
window.addEventListener('resize', () => {
  document.getElementById('btn-menu-toggle').style.display =
    window.innerWidth <= 900 ? 'flex' : 'none';
});
</script>
</body>
</html>
